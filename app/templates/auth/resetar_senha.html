{% extends "base.html" %}
{% block title %}Redefinir Senha – Tênis{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <h1>Nova senha</h1>
    <form method="POST">
      <div class="field pw-field">
        <input type="password" name="nm_senha" id="pw1" class="control" placeholder="Nova senha" required>
        <button type="button" class="toggle-pw" onclick="togglePw('pw1')">&#128065;</button>
      </div>
      <div class="field pw-field">
        <input type="password" name="nm_conf" id="pw2" class="control" placeholder="Confirmar nova senha" required>
        <button type="button" class="toggle-pw" onclick="togglePw('pw2')">&#128065;</button>
      </div>
      <button type="submit" class="btn-submit">Salvar senha</button>
    </form>
  </div>
</div>
{% endblock %}
