{% extends "base.html" %}
{% block title %}Esqueci a Senha – Shared Tênnis{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <h1>Esqueci minha senha</h1>
    <p class="auth-sub">Informe seu e-mail cadastrado para receber o link de redefinição.</p>
    <form method="POST">
      <div class="field">
        <input type="email" name="nm_email" class="control" placeholder="Seu e-mail" required autofocus>
      </div>
      <button type="submit" class="btn-submit">Enviar link</button>
      <div class="auth-links">
        <a href="{{ url_for('auth.login') }}">Voltar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
